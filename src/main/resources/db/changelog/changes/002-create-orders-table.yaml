databaseChangeLog:
  - changeSet:
      id: 2
      author: timode-6
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_orders
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: total_price
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    defaultValueComputed: CURRENT_TIMESTAMP
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    defaultValueComputed: CURRENT_TIMESTAMP
                    nullable: false
        - sql:
            splitStatements: false
            stripComments: false
            sql: |
              ALTER TABLE orders
              ADD CONSTRAINT chk_orders_status
              CHECK (status IN ('PENDING','CONFIRMED','SHIPPED','DELIVERED','CANCELLED'));
      rollback:
        - dropTable:
            tableName: orders