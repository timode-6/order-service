databaseChangeLog:
  - changeSet:
      id: 1
      author: timode-6
      changes:
        - createTable:
            tableName: items
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_items
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    defaultValueComputed: CURRENT_TIMESTAMP
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    defaultValueComputed: CURRENT_TIMESTAMP
                    nullable: false
      rollback:
        - dropTable:
            tableName: items