databaseChangeLog:
  - changeSet:
      id: 3
      author: timode-6
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_order_items
                    nullable: false
              - column:
                  name: order_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_order
                    references: orders(id)
              - column:
                  name: item_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_item
                    references: items(id)
              - column:
                  name: quantity
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    defaultValueComputed: CURRENT_TIMESTAMP
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    defaultValueComputed: CURRENT_TIMESTAMP
                    nullable: false
        - sql:
            sql: |
              ALTER TABLE order_items
              ADD CONSTRAINT chk_order_items_quantity CHECK (quantity > 0);
      rollback:
        - dropTable:
            tableName: order_items