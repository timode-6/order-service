spring.application.name=order_service
server.port=8083
spring.profiles.active=local
spring.config.import=optional:file:.env[.properties]

spring.jpa.hibernate.ddl-auto=validate          
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.default-schema=public
spring.liquibase.liquibase-schema=public

gateway.internal-secret=1$MjQ0ODc4ZTNhOGM5N2ViNDIzYmEzNDJhN2VmMjMwMzE$GYaUg+8XVS1Y0WBhM2HdGJ0Wyjneyu19mQfd9OtutWQ
services.user-service.base-url=http://localhost:8082
logging.leve.liquibase=INFO
logging.level.org.hibernate.SQL=WARN

spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level){cyan} [%thread] %cyan(%logger{15}) - %msg%n

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.trusted.packages=*
 
spring.kafka.consumer.properties.spring.json.use.type.headers=false
 
kafka.topics.payment-created=payment.created
kafka.consumer.group-id=order-service-group
 